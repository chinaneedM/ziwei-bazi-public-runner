name: source-topology-diagnostic

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'requests/*.json'

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout private authority repository
        uses: actions/checkout@v4
        with:
          repository: chinaneedM/ziwei-bazi-model
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private-authority
          fetch-depth: 1
          persist-credentials: false
          lfs: true

      - name: Scan matching S19 filenames by content address
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json
          from pathlib import Path

          root = Path('private-authority')
          manifest = json.loads((root / 'knowledge/releases/KNOWLEDGE-R17/release-manifest.json').read_text(encoding='utf-8'))
          row = next(item for item in manifest['source_files'] if item['library_id'] == 'S19')
          matches = []
          for path in root.rglob(row['canonical_filename']):
              if not path.is_file():
                  continue
              size = path.stat().st_size
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              matches.append({
                  'path': str(path.relative_to(root)),
                  'size_bytes': size,
                  'sha256': digest,
                  'exact_match': size == row['file_size_bytes'] and digest == row['sha256_raw_file_bytes'],
              })
          result = {
              'schema': 'S19-FILENAME-CONTENT-SCAN-V1',
              'expected_sha256': row['sha256_raw_file_bytes'],
              'expected_size_bytes': row['file_size_bytes'],
              'canonical_filename': row['canonical_filename'],
              'matches': sorted(matches, key=lambda item: item['path']),
              'contains_source_content': False,
              'contains_answer_data': False,
              'engineering_mode_only': True,
          }
          Path('/tmp/s19-content-address-diagnostic.json').write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps({
              'filename_match_count': len(matches),
              'exact_match_count': sum(1 for item in matches if item['exact_match']),
          }, sort_keys=True))
          PY

      - name: Upload content-address diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: s19-content-address-diagnostic-${{ github.run_id }}
          path: /tmp/s19-content-address-diagnostic.json
          if-no-files-found: error
          retention-days: 1
