name: private-repo-task

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'requests/*.json'

permissions:
  contents: read

concurrency:
  group: private-repo-task-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  execute:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout trusted public executor base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Checkout request revision without credentials
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: request-revision
          persist-credentials: false
          fetch-depth: 0

      - name: Resolve and validate single request
        id: request
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          cd request-revision
          mapfile -t changed < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          [[ "${#changed[@]}" -eq 1 ]]
          request="${changed[0]}"
          case "$request" in requests/*.json) ;; *) exit 1 ;; esac
          python - "$request" <<'PY'
          import json, re, sys
          from pathlib import Path
          body = json.loads(Path(sys.argv[1]).read_text(encoding='utf-8'))
          expected = {
              'schema': 'FORTUNE-PUBLIC-EXECUTOR-REQUEST-V1',
              'status': 'REQUESTED',
              'task': 'BUILD_RUNTIME_PACKETS',
              'private_repository': 'chinaneedM/ziwei-bazi-model',
              'answer_data_available': False,
          }
          for key, value in expected.items():
              if body.get(key) != value:
                  raise SystemExit(f'invalid {key}')
          if not re.fullmatch(r'runtime/runtime-packet-requests/[A-Za-z0-9._-]+\.json', body.get('private_request_path', '')):
              raise SystemExit('invalid private request path')
          if not re.fullmatch(r'GROUP-RUN-[A-Za-z0-9._-]+', body.get('group_run_id', '')):
              raise SystemExit('invalid group run id')
          if not re.fullmatch(r'[0-9a-f]{64}', body.get('private_request_sha256', '')):
              raise SystemExit('invalid private request digest')
          PY
          echo "request_path=$request" >> "$GITHUB_OUTPUT"

      - name: Require private repository credential
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: test -n "$PRIVATE_REPO_TOKEN"

      - name: Checkout private authority repository
        uses: actions/checkout@v4
        with:
          repository: chinaneedM/ziwei-bazi-model
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private-authority
          fetch-depth: 1
          persist-credentials: true
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify private request binding
        env:
          PUBLIC_REQUEST_PATH: ${{ steps.request.outputs.request_path }}
        run: |
          set -euo pipefail
          python - "$PUBLIC_REQUEST_PATH" <<'PY'
          import hashlib, json, sys
          from pathlib import Path
          public = json.loads((Path('request-revision') / sys.argv[1]).read_text(encoding='utf-8'))
          path = Path('private-authority') / public['private_request_path']
          if hashlib.sha256(path.read_bytes()).hexdigest() != public['private_request_sha256']:
              raise SystemExit('private request digest mismatch')
          private = json.loads(path.read_text(encoding='utf-8'))
          if private.get('group_run_id') != public['group_run_id'] or private.get('answer_data_available') is not False:
              raise SystemExit('private request binding failed')
          PY

      - name: Materialize content-addressed release sources
        env:
          PUBLIC_REQUEST_PATH: ${{ steps.request.outputs.request_path }}
        run: |
          set -euo pipefail
          python - "$PUBLIC_REQUEST_PATH" <<'PY'
          import hashlib, json, sys
          from pathlib import Path

          root = Path('private-authority')
          public = json.loads((Path('request-revision') / sys.argv[1]).read_text(encoding='utf-8'))
          request = json.loads((root / public['private_request_path']).read_text(encoding='utf-8'))
          manifest = json.loads((root / request['knowledge_manifest_path']).read_text(encoding='utf-8'))
          materialized = []

          for row in manifest['source_files']:
              expected = root / row['repository_relative_path']
              if expected.is_file():
                  data = expected.read_bytes()
                  if len(data) != row['file_size_bytes'] or hashlib.sha256(data).hexdigest() != row['sha256_raw_file_bytes']:
                      raise SystemExit(f"existing source mismatch: {row['library_id']}")
                  continue

              base = root / 'knowledge' / 'base' / row['canonical_filename']
              if not base.is_file():
                  raise SystemExit(f"canonical base missing: {row['library_id']}")

              if row['library_id'] == 'S19':
                  overlay = root / 'knowledge/candidates/KNOWLEDGE-R17-PROMPT-CUTOVER-CANDIDATE/S19-R17-control-root-overlay.txt'
                  o, b = overlay.read_bytes(), base.read_bytes()
                  variants = {
                      'OVERLAY_PLUS_BASE': o + b,
                      'OVERLAY_TRIM_LF_PLUS_LF_PLUS_BASE': o.rstrip(b'\n') + b'\n' + b,
                      'OVERLAY_PLUS_BASE_LSTRIP_LF': o + b.lstrip(b'\n'),
                      'SINGLE_LF_BOUNDARY': o.rstrip(b'\r\n') + b'\n' + b.lstrip(b'\r\n'),
                      'DOUBLE_LF_BOUNDARY': o.rstrip(b'\r\n') + b'\n\n' + b.lstrip(b'\r\n'),
                  }
                  exact_by_digest = {}
                  names_by_digest = {}
                  for name, candidate in variants.items():
                      digest = hashlib.sha256(candidate).hexdigest()
                      if len(candidate) == row['file_size_bytes'] and digest == row['sha256_raw_file_bytes']:
                          exact_by_digest[digest] = candidate
                          names_by_digest.setdefault(digest, []).append(name)
                  if len(exact_by_digest) != 1:
                      summary = {name: {'size': len(data), 'sha256': hashlib.sha256(data).hexdigest()} for name, data in variants.items()}
                      Path('/tmp/runtime-packet-diagnostic.json').write_text(json.dumps({
                          'schema': 'R17-S19-COMPOSITE-DIAGNOSTIC-V1',
                          'expected_size': row['file_size_bytes'],
                          'expected_sha256': row['sha256_raw_file_bytes'],
                          'variants': summary,
                          'contains_source_content': False,
                          'contains_answer_data': False,
                      }, indent=2) + '\n', encoding='utf-8')
                      raise SystemExit('no unique exact R17 S19 byte content')
                  digest, data = next(iter(exact_by_digest.items()))
                  mode = '|'.join(sorted(names_by_digest[digest]))
              else:
                  data = base.read_bytes()
                  mode = 'CANONICAL_BASE_ALIAS'
                  if len(data) != row['file_size_bytes'] or hashlib.sha256(data).hexdigest() != row['sha256_raw_file_bytes']:
                      raise SystemExit(f"canonical base mismatch: {row['library_id']}")

              expected.parent.mkdir(parents=True, exist_ok=True)
              expected.write_bytes(data)
              materialized.append({
                  'library_id': row['library_id'],
                  'path': row['repository_relative_path'],
                  'mode': mode,
                  'size_bytes': len(data),
                  'sha256': hashlib.sha256(data).hexdigest(),
              })

          Path('/tmp/source-materializations.json').write_text(json.dumps(materialized, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps({'materialized_count': len(materialized), 'library_ids': [x['library_id'] for x in materialized]}, sort_keys=True))
          PY

      - name: Build and verify answer-free runtime packets
        env:
          PUBLIC_REQUEST_PATH: ${{ steps.request.outputs.request_path }}
        run: |
          set -euo pipefail
          private_request="$(python - "$PUBLIC_REQUEST_PATH" <<'PY'
          import json, sys
          from pathlib import Path
          print(json.loads((Path('request-revision') / sys.argv[1]).read_text(encoding='utf-8'))['private_request_path'])
          PY
          )"
          cd private-authority
          set +e
          python scripts/create-group-runtime-packets.py --request "$private_request" --max-per-question 8 > /tmp/runtime-packet-result.json 2> /tmp/runtime-packet-error.log
          status=$?
          set -e
          if [[ "$status" -ne 0 ]]; then
            python - "$status" <<'PY'
          import json, re, sys
          from pathlib import Path
          lines = Path('/tmp/runtime-packet-error.log').read_text(encoding='utf-8', errors='replace').splitlines()[-30:]
          safe = [re.sub(r'/home/runner/[^ ]+', '<RUNNER_PATH>', line)[:500] for line in lines]
          Path('/tmp/runtime-packet-diagnostic.json').write_text(json.dumps({
              'schema': 'PUBLIC-RUNNER-SANITIZED-DIAGNOSTIC-V1',
              'exit_code': int(sys.argv[1]),
              'stderr_tail': safe,
              'contains_case_stdout': False,
              'contains_answer_data': False,
          }, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
            exit "$status"
          fi
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path('/tmp/runtime-packet-result.json').read_text(encoding='utf-8'))
          if result.get('status') != 'READY_FOR_BLIND_PREDICTION' or result.get('answer_data_available') is not False:
              raise SystemExit('runtime packet result failed')
          transport = json.loads(Path(result['transport_plan_path']).read_text(encoding='utf-8'))
          if transport.get('status') != 'READY' or transport.get('answer_data_available') is not False:
              raise SystemExit('transport plan failed')
          print(json.dumps({
              'status': result['status'],
              'group_run_id': result['group_run_id'],
              'case_count': result['case_count'],
              'generated_path_count': result['generated_path_count'],
              'source_packet_item_counts': result['source_packet_item_counts'],
          }, sort_keys=True))
          PY

      - name: Upload sanitized diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sanitized-runtime-packet-diagnostic-${{ github.run_id }}
          path: /tmp/runtime-packet-diagnostic.json
          if-no-files-found: ignore
          retention-days: 1

      - name: Commit repaired sources and bound runtime output
        if: success()
        env:
          PUBLIC_REQUEST_PATH: ${{ steps.request.outputs.request_path }}
        run: |
          set -euo pipefail
          group_run_id="$(python - "$PUBLIC_REQUEST_PATH" <<'PY'
          import json, sys
          from pathlib import Path
          print(json.loads((Path('request-revision') / sys.argv[1]).read_text(encoding='utf-8'))['group_run_id'])
          PY
          )"
          cd private-authority
          output_root="data/group-clean-starts/${group_run_id}"
          mapfile -t source_paths < <(python - <<'PY'
          import json
          from pathlib import Path
          for row in json.loads(Path('/tmp/source-materializations.json').read_text(encoding='utf-8')):
              print(row['path'])
          PY
          )
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -- "$output_root"
          for path in "${source_paths[@]}"; do git add -- "$path"; done
          mapfile -t staged < <(git diff --cached --name-only)
          [[ "${#staged[@]}" -gt 0 ]]
          for path in "${staged[@]}"; do
            allowed=false
            case "$path" in "$output_root"/*) allowed=true ;; esac
            for source in "${source_paths[@]}"; do [[ "$path" == "$source" ]] && allowed=true; done
            [[ "$allowed" == true ]]
          done
          git commit -m "Restore R17 S19 and materialize runtime packets for ${group_run_id}"
          git push origin HEAD:main
