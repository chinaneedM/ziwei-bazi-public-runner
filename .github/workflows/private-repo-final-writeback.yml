name: private-repo-final-writeback

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'requests/*.json'

permissions:
  contents: read

jobs:
  final-writeback:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: request-head
          persist-credentials: false
          fetch-depth: 0

      - name: Validate one request
        id: request
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          cd request-head
          mapfile -t changed < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          [[ "${#changed[@]}" -eq 1 ]]
          request="${changed[0]}"; case "$request" in requests/*.json) ;; *) exit 1 ;; esac
          python - "$request" <<'PY'
          import json,re,sys
          from pathlib import Path
          b=json.loads(Path(sys.argv[1]).read_text(encoding='utf-8'))
          e={'schema':'FORTUNE-PUBLIC-EXECUTOR-REQUEST-V1','status':'REQUESTED','task':'BUILD_RUNTIME_PACKETS','private_repository':'chinaneedM/ziwei-bazi-model','answer_data_available':False}
          for k,v in e.items():
              if b.get(k)!=v: raise SystemExit(k)
          if not re.fullmatch(r'runtime/runtime-packet-requests/[A-Za-z0-9._-]+\.json',b.get('private_request_path','')): raise SystemExit('path')
          if not re.fullmatch(r'GROUP-RUN-[A-Za-z0-9._-]+',b.get('group_run_id','')): raise SystemExit('run')
          if not re.fullmatch(r'[0-9a-f]{64}',b.get('private_request_sha256','')): raise SystemExit('digest')
          PY
          echo "path=$request" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          repository: chinaneedM/ziwei-bazi-model
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private-authority
          fetch-depth: 1
          persist-credentials: true
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Reconstruct and build verified objects
        env:
          REQUEST_PATH: ${{ steps.request.outputs.path }}
        run: |
          set -euo pipefail
          python - "$REQUEST_PATH" <<'PY'
          import hashlib,json,sys
          from pathlib import Path
          pub=json.loads((Path('request-head')/sys.argv[1]).read_text(encoding='utf-8'))
          root=Path('private-authority'); private=root/pub['private_request_path']
          if hashlib.sha256(private.read_bytes()).hexdigest()!=pub['private_request_sha256']: raise SystemExit('request digest')
          req=json.loads(private.read_text(encoding='utf-8'))
          if req.get('group_run_id')!=pub['group_run_id'] or req.get('answer_data_available') is not False: raise SystemExit('binding')
          manifest=json.loads((root/req['knowledge_manifest_path']).read_text(encoding='utf-8'))
          mats=[]
          for row in manifest['source_files']:
              target=root/row['repository_relative_path']
              if target.is_file(): data=target.read_bytes()
              else:
                  base=(root/'knowledge/base'/row['canonical_filename']).read_bytes()
                  if row['library_id']=='S19':
                      overlay=(root/'knowledge/candidates/KNOWLEDGE-R17-PROMPT-CUTOVER-CANDIDATE/S19-R17-control-root-overlay.txt').read_bytes(); data=overlay.rstrip(b'\n')+b'\n'+base
                  else: data=base
                  target.parent.mkdir(parents=True,exist_ok=True); target.write_bytes(data); mats.append(row['repository_relative_path'])
              if len(data)!=row['file_size_bytes'] or hashlib.sha256(data).hexdigest()!=row['sha256_raw_file_bytes']: raise SystemExit(row['library_id'])
          Path('/tmp/mats.json').write_text(json.dumps(mats,ensure_ascii=False)+'\n')
          Path('/tmp/private-request.txt').write_text(pub['private_request_path'])
          Path('/tmp/group-run.txt').write_text(pub['group_run_id'])
          PY
          cd private-authority
          python scripts/create-group-runtime-packets.py --request "$(cat /tmp/private-request.txt)" --max-per-question 8 >/tmp/build-result.json
          python - <<'PY'
          import json
          from pathlib import Path
          r=json.loads(Path('/tmp/build-result.json').read_text())
          if r.get('status')!='READY_FOR_BLIND_PREDICTION' or r.get('answer_data_available') is not False: raise SystemExit('result')
          t=json.loads(Path(r['transport_plan_path']).read_text())
          if t.get('status')!='READY' or t.get('answer_data_available') is not False: raise SystemExit('transport')
          print(json.dumps({'status':r['status'],'group_run_id':r['group_run_id'],'case_count':r['case_count'],'generated_path_count':r['generated_path_count'],'source_packet_item_counts':r['source_packet_item_counts']},sort_keys=True))
          PY

      - name: Commit and push unicode-safe private audit branch
        run: |
          set -euo pipefail
          cd private-authority
          group_run="$(cat /tmp/group-run.txt)"
          output_root="data/group-clean-starts/${group_run}"
          branch="public-executor/${group_run}-${GITHUB_RUN_ID}"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git config core.quotepath false
          git add -f -- "$output_root"
          while IFS= read -r path; do git add -f -- "$path"; done < <(python - <<'PY'
          import json
          from pathlib import Path
          for x in json.loads(Path('/tmp/mats.json').read_text()): print(x)
          PY
          )
          python - "$output_root" <<'PY'
          import subprocess,sys
          root=sys.argv[1]
          raw=subprocess.check_output(['git','diff','--cached','--name-only','-z'])
          paths=[x.decode('utf-8') for x in raw.split(b'\0') if x]
          allowed_source='knowledge/candidates/KNOWLEDGE-R17-PROMPT-CUTOVER-CANDIDATE/materialized/S19_运行门禁训练释放反馈审计与校准库.txt'
          if not paths: raise SystemExit('no staged files')
          for path in paths:
              if path.startswith(root+'/') or path==allowed_source: continue
              raise SystemExit('out-of-scope: '+path)
          print('validated staged files:',len(paths))
          PY
          git commit -m "Restore R17 S19 and materialize runtime packets for ${group_run}"
          set +e
          git push origin "HEAD:refs/heads/${branch}" 2>/tmp/push-error.log
          status=$?
          set -e
          if [[ "$status" -ne 0 ]]; then
            python - "$status" <<'PY'
          import json,re,sys
          from pathlib import Path
          lines=Path('/tmp/push-error.log').read_text(encoding='utf-8',errors='replace').splitlines()[-30:]
          safe=[re.sub(r'gh[pousr]_[A-Za-z0-9_]+','<REDACTED_TOKEN>',x)[:500] for x in lines]
          Path('/tmp/final-writeback-diagnostic.json').write_text(json.dumps({'schema':'FINAL-WRITEBACK-DIAGNOSTIC-V1','exit_code':int(sys.argv[1]),'stderr_tail':safe,'contains_answer_data':False},indent=2)+'\n')
          PY
            exit "$status"
          fi
          commit="$(git rev-parse HEAD)"
          printf '{"schema":"FINAL-WRITEBACK-RECEIPT-V1","status":"PASS","branch":"%s","commit_sha":"%s","group_run_id":"%s","contains_answer_data":false}\n' "$branch" "$commit" "$group_run" > /tmp/final-writeback-receipt.json

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: final-writeback-receipt-${{ github.run_id }}
          path: /tmp/final-writeback-receipt.json
          retention-days: 1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: final-writeback-diagnostic-${{ github.run_id }}
          path: /tmp/final-writeback-diagnostic.json
          if-no-files-found: ignore
          retention-days: 1
