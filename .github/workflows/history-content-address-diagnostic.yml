name: history-content-address-diagnostic

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'requests/*.json'

permissions:
  contents: read

jobs:
  diagnose-history:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout private authority repository history
        uses: actions/checkout@v4
        with:
          repository: chinaneedM/ziwei-bazi-model
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private-authority
          fetch-depth: 0
          persist-credentials: true
          lfs: false

      - name: Fetch branch tag and pull-request refs
        shell: bash
        run: |
          set -euo pipefail
          cd private-authority
          git fetch --force origin \
            '+refs/heads/*:refs/remotes/origin/*' \
            '+refs/tags/*:refs/tags/*' \
            '+refs/pull/*/head:refs/remotes/pull/*'

      - name: Locate S19 blobs and LFS content addresses
        shell: bash
        run: |
          set -euo pipefail
          cd private-authority
          python - <<'PY'
          import hashlib, json, re, subprocess
          from pathlib import Path

          expected = '59a0c04a282125929317b7166f9137b440f1f6d239bf27aec5b740d20b5c6a91'
          expected_size = 10283817
          rows = subprocess.check_output(['git', 'rev-list', '--objects', '--all'], text=True, errors='replace').splitlines()
          candidates = []
          seen = set()
          for row in rows:
              parts = row.split(' ', 1)
              if len(parts) != 2:
                  continue
              oid, path = parts
              if 'S19' not in path and '运行门禁训练释放反馈审计与校准库' not in path:
                  continue
              if oid in seen:
                  continue
              seen.add(oid)
              try:
                  if subprocess.check_output(['git', 'cat-file', '-t', oid], text=True).strip() != 'blob':
                      continue
                  content = subprocess.check_output(['git', 'cat-file', '-p', oid])
              except subprocess.CalledProcessError:
                  continue
              item = {'git_blob_oid': oid, 'path': path, 'blob_size_bytes': len(content)}
              text = content.decode('utf-8', errors='replace')
              lfs_oid = re.search(r'^oid sha256:([0-9a-f]{64})$', text, re.M)
              lfs_size = re.search(r'^size (\d+)$', text, re.M)
              if lfs_oid:
                  item['storage_mode'] = 'GIT_LFS_POINTER'
                  item['content_sha256'] = lfs_oid.group(1)
                  item['content_size_bytes'] = int(lfs_size.group(1)) if lfs_size else None
              else:
                  item['storage_mode'] = 'GIT_BLOB'
                  item['content_sha256'] = hashlib.sha256(content).hexdigest()
                  item['content_size_bytes'] = len(content)
              item['exact_match'] = item['content_sha256'] == expected and item['content_size_bytes'] == expected_size
              commits = subprocess.check_output(
                  ['git', 'log', '--all', '--find-object=' + oid, '--format=%H', '-n', '5'],
                  text=True, errors='replace'
              ).splitlines()
              item['reachable_commits'] = commits
              candidates.append(item)
          result = {
              'schema': 'S19-HISTORY-CONTENT-ADDRESS-DIAGNOSTIC-V1',
              'expected_sha256': expected,
              'expected_size_bytes': expected_size,
              'candidates': sorted(candidates, key=lambda x: (not x['exact_match'], x['path'], x['git_blob_oid'])),
              'contains_source_content': False,
              'contains_answer_data': False,
              'engineering_mode_only': True,
          }
          Path('/tmp/s19-history-content-address-diagnostic.json').write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps({
              'candidate_count': len(candidates),
              'exact_match_count': sum(1 for item in candidates if item['exact_match']),
          }, sort_keys=True))
          PY

      - name: Upload history content-address diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: s19-history-content-address-diagnostic-${{ github.run_id }}
          path: /tmp/s19-history-content-address-diagnostic.json
          if-no-files-found: error
          retention-days: 1
